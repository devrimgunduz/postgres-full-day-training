# Usage:
#   Hour 1-2:  docker compose up -d
#   Hour 3+:   docker compose --profile dba up -d

services:
  # Primary PostgreSQL - always starts
  postgres:
    build: .
    platform: linux/amd64
    container_name: postgres-training
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: training
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./logs:/var/log/postgresql
    command: postgres -c wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Subscriber for logical replication demo (Hour 3)
  postgres-subscriber:
    profiles: ["dba"]
    build: .
    platform: linux/amd64
    container_name: postgres-subscriber
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: training
    ports:
      - "5433:5432"
    volumes:
      - postgres_subscriber_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Connection pooler (Hour 3)
  pgbouncer:
    profiles: ["dba"]
    image: edoburu/pgbouncer:latest
    platform: linux/amd64
    container_name: pgbouncer-training
    environment:
      DATABASE_URL: postgres://postgres:training@postgres:5432/bluebox
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 10
      MIN_POOL_SIZE: 5
      AUTH_TYPE: plain
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_subscriber_data:
